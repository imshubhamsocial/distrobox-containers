# Speech Dispatcher configuration for Piper TTS using the generic driver
# Configured for the high-quality, natural-sounding "en_US-amy-medium" female voice.

GenericExecuteSynth "printf %s '$DATA' | /usr/local/bin/piper --model /usr/share/piper-voices/en_US-amy-medium.onnx --output_raw | aplay -r 22050 -f S16_LE -c 1 -t raw"

GenericCmdDependency "/usr/local/bin/piper"
GenericCmdDependency "aplay"

# We must strip shell command injection and quote characters that cause shell syntax truncation
GenericStripPunctChars  "|;&<>`$\"'\\"

# Default voice settings
AddVoice	"en"	"FEMALE1"		"en_US-amy-medium"
defaultVoice    "en_US-amy-medium"
